name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for secrets in code
        run: |
          if grep -rE "(ZARINPAL_MERCHANT|SEP_TERMINAL_ID|SEP_PASSWORD)\s*=\s*['\"][^'\"]{5,}" src/; then
            echo "Hardcoded credentials detected in source"
            exit 1
          fi

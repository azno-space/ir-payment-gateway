<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ir-payment-gateway banner</title>
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#3b82f6"/>
    <stop offset="100%" stop-color="#6366f1"/>
  </linearGradient>
  <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </linearGradient>
  <filter id="blur1">
    <feGaussianBlur stdDeviation="40"/>
  </filter>
  <filter id="blur2">
    <feGaussianBlur stdDeviation="30"/>
  </filter>
  <clipPath id="round">
    <rect width="1200" height="280" rx="16"/>
  </clipPath>
</defs>

<!-- Background -->
<rect width="1200" height="280" rx="16" fill="url(#bg)"/>

<!-- Glow blobs -->
<ellipse cx="200" cy="100" rx="280" ry="180" fill="url(#glow1)" filter="url(#blur1)" clip-path="url(#round)"/>
<ellipse cx="1050" cy="180" rx="240" ry="160" fill="url(#glow2)" filter="url(#blur2)" clip-path="url(#round)"/>

<!-- Grid lines -->
<g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" clip-path="url(#round)">
  <line x1="0" y1="56" x2="1200" y2="56"/>
  <line x1="0" y1="112" x2="1200" y2="112"/>
  <line x1="0" y1="168" x2="1200" y2="168"/>
  <line x1="0" y1="224" x2="1200" y2="224"/>
  <line x1="100" y1="0" x2="100" y2="280"/>
  <line x1="250" y1="0" x2="250" y2="280"/>
  <line x1="400" y1="0" x2="400" y2="280"/>
  <line x1="550" y1="0" x2="550" y2="280"/>
  <line x1="700" y1="0" x2="700" y2="280"/>
  <line x1="850" y1="0" x2="850" y2="280"/>
  <line x1="1000" y1="0" x2="1000" y2="280"/>
  <line x1="1150" y1="0" x2="1150" y2="280"/>
</g>

<!-- Border -->
<rect width="1200" height="280" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

<!-- Left icon box -->
<rect x="52" y="90" width="72" height="72" rx="18" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
<rect x="66" y="110" width="44" height="30" rx="5" fill="none" stroke="#3b82f6" stroke-width="2"/>
<line x1="66" y1="120" x2="110" y2="120" stroke="#3b82f6" stroke-width="2"/>
<rect x="72" y="125" width="12" height="7" rx="2" fill="#3b82f6" opacity="0.7"/>

<!-- Main title -->
<text x="152" y="140" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-1">ir-payment-gateway</text>

<!-- Accent underline -->
<rect x="152" y="150" width="420" height="3" rx="2" fill="url(#accent)"/>

<!-- Subtitle -->
<text x="152" y="182" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.2">Database-free Iranian payment middleware · Zibal · Zarinpal · SEP</text>

<!-- Badges row -->
<g transform="translate(152, 205)">
  <rect width="52" height="24" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="26" y="16.5" font-family="monospace" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle">MIT</text>
  <rect x="60" width="80" height="24" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="16.5" font-family="monospace" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle">Node ≥ 18</text>
  <rect x="148" width="100" height="24" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="198" y="16.5" font-family="monospace" font-size="11" font-weight="600" fill="#d2a8ff" text-anchor="middle">No Database</text>
  <rect x="256" width="88" height="24" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="16.5" font-family="monospace" font-size="11" font-weight="600" fill="#ffa657" text-anchor="middle">Webhooks</text>
</g>

<!-- Right side flow diagram -->
<g transform="translate(740, 60)">
  <rect x="0" y="40" width="88" height="44" rx="10" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="44" y="58" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Your App</text>
  <text x="44" y="75" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle">POST /payments</text>

  <line x1="92" y1="62" x2="116" y2="62" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="116,58 124,62 116,66" fill="#30363d"/>

  <rect x="128" y="30" width="88" height="64" rx="10" fill="#1a2540" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="172" y="52" font-family="sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">ir-payment</text>
  <text x="172" y="65" font-family="sans-serif" font-size="9" fill="#58a6ff" text-anchor="middle" font-weight="600">gateway</text>
  <text x="172" y="82" font-family="monospace" font-size="8" fill="#3b82f6" text-anchor="middle">Route + Verify</text>

  <line x1="220" y1="62" x2="244" y2="62" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="244,58 252,62 244,66" fill="#30363d"/>

  <rect x="256" y="40" width="88" height="44" rx="10" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="58" font-family="sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Bank</text>
  <text x="300" y="75" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">SEP / ZP / ZB</text>

  <path d="M300 84 L300 130 L172 130 L172 94" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <polygon points="168,94 172,84 176,94" fill="#10b981"/>

  <rect x="196" y="118" width="90" height="22" rx="6" fill="#0d2818" stroke="#10b981" stroke-width="1"/>
  <text x="241" y="133" font-family="monospace" font-size="9" fill="#3fb950" text-anchor="middle">✓ Webhook</text>

  <text x="44" y="102" font-family="sans-serif" font-size="9" fill="#484f58" text-anchor="middle">① Request</text>
  <text x="172" y="110" font-family="sans-serif" font-size="9" fill="#484f58" text-anchor="middle">② Route</text>
  <text x="300" y="102" font-family="sans-serif" font-size="9" fill="#484f58" text-anchor="middle">③ Pay</text>

  <rect x="60" y="155" width="144" height="22" rx="6" fill="#1c1a0d" stroke="#d29922" stroke-width="1"/>
  <text x="132" y="170" font-family="sans-serif" font-size="9" fill="#e3b341" text-anchor="middle">⚡ Auto Fail-over: SEP → ZP</text>
</g>

<g fill="#ffffff" fill-opacity="0.04" clip-path="url(#round)">
  <circle cx="1130" cy="30" r="2"/><circle cx="1150" cy="30" r="2"/><circle cx="1170" cy="30" r="2"/>
  <circle cx="1130" cy="50" r="2"/><circle cx="1150" cy="50" r="2"/><circle cx="1170" cy="50" r="2"/>
  <circle cx="1130" cy="70" r="2"/><circle cx="1150" cy="70" r="2"/><circle cx="1170" cy="70" r="2"/>
</g>
</svg>
